name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings 300

      - name: Run unit tests
        run: npm run test:unit

  integration-tests:
    runs-on: docker
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: omenaa_test
          POSTGRES_USER: omenaa
          POSTGRES_PASSWORD: omenaa_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://omenaa:omenaa_test@postgres:5432/omenaa_test
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: node db/run-migrations.mjs && npx drizzle-kit push

      - name: Run integration tests
        run: npm run test:integration

  build:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (standalone)
        run: npm run build
        env:
          NEXTAUTH_SECRET: ci-build-secret
          ENCRYPTION_KEY: ci-build-encryption-key-32chars

      - name: Verify output
        run: |
          test -d .next/standalone || (echo "ERROR: .next/standalone/ not found" && exit 1)
          test -f .next/standalone/server.js || (echo "ERROR: server.js not found" && exit 1)
          echo "Build output OK"
          ls -la .next/standalone/

  e2e-tests:
    needs: build
    runs-on: docker
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build
        env:
          NEXTAUTH_SECRET: ci-build-secret
          ENCRYPTION_KEY: ci-build-encryption-key-32chars

      - name: Prepare standalone server
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      - name: Start production server
        run: node .next/standalone/server.js &
        env:
          PORT: "3002"
          HOSTNAME: 0.0.0.0
          NEXTAUTH_SECRET: ci-build-secret
          NEXTAUTH_URL: http://localhost:3002/omenaa
          ENCRYPTION_KEY: ci-build-encryption-key-32chars

      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3002/omenaa/en > /dev/null; then
              echo "Server is ready"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Server did not start in time"
          exit 1

      - name: Run e2e tests (smoke)
        run: npx playwright test tests/e2e/smoke.spec.ts --project=smoke --retries=0

  ci-gate:
    needs: [checks, integration-tests, build, e2e-tests]
    runs-on: docker
    steps:
      - run: echo "CI gate passed"

  push-to-external:
    needs: ci-gate
    if: github.event_name == 'push'
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to GitHub
        run: |
          git remote add external "${{ secrets.EXTERNAL_REPO_URL }}" || git remote set-url external "${{ secrets.EXTERNAL_REPO_URL }}"
          git push external HEAD:main --force
