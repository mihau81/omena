services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3002:3002"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - DATABASE_URL=postgresql://omenaa:omenaa_dev@db:5432/omenaa
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=omenaa
      - MINIO_SECRET_KEY=omenaa_dev
      - NEXTAUTH_SECRET=dev-secret-change-in-production
      - NEXTAUTH_URL=http://localhost:3002/omenaa
    depends_on:
      - db
      - minio

  prod:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3080:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://omenaa:${POSTGRES_PASSWORD:-omenaa_dev}@db:5432/omenaa
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-omenaa}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-omenaa_dev}
      - AUTH_TRUST_HOST=true
    depends_on:
      - db
      - minio
      - redis

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: omenaa
      POSTGRES_USER: omenaa
      POSTGRES_PASSWORD: omenaa_dev
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: omenaa
      MINIO_ROOT_PASSWORD: omenaa_dev
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data

volumes:
  pgdata:
  minio_data:
  redis_data:
