services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omenaa_app
    restart: unless-stopped
    ports:
      - "3080:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - omenaa_network

  db:
    image: postgres:16-alpine
    container_name: omenaa_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: omenaa
      POSTGRES_USER: omenaa
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omenaa"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - omenaa_network

  minio:
    image: minio/minio
    container_name: omenaa_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9002:9000"
    volumes:
      - minio_data:/data
    networks:
      - omenaa_network

  redis:
    image: redis:7-alpine
    container_name: omenaa_redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - omenaa_network

volumes:
  pgdata:
  minio_data:

networks:
  omenaa_network:
    driver: bridge
